<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mental Health</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">🏥 Wellness</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}" class="nav-link">Home</a></li>
                <li><a href="{{ url_for('physical') }}" class="nav-link">Physical</a></li>
                <li><a href="{{ url_for('mental') }}" class="nav-link">Mental</a></li>
                <li><a href="{{ url_for('social') }}" class="nav-link">Social</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero small">
        <div class="hero-content">
            <h1>Mental Health</h1>
        </div>
    </header>
    <main class="container">
        <section class="card mental">
            <h2>How are you feeling?</h2>
            <form action="{{ url_for('mental_ai') }}" method="post">
                <select name="feeling" required>
                    <option value="">Choose your feeling</option>
                    <option value="happy">😊 Happy</option>
                    <option value="sad">😔 Sad</option>
                    <option value="stressed">😣 Stressed</option>
                    <option value="anxious">😰 Anxious</option>
                    <option value="angry">😡 Angry</option>
                    <option value="lonely">🤝 Lonely</option>
                    <option value="overwhelmed">😵 Overwhelmed</option>
                    <option value="hopeful">🌤️ Hopeful</option>
                    <option value="tired">😴 Tired</option>
                    <option value="grief">💧 Grief</option>
                    <option value="confused">🤔 Confused</option>
                    <option value="motivated">🔥 Motivated</option>
                    <option value="depressed">🖤 Depressed</option>
                </select>
                <button type="submit">Get Support</button>
            </form>
        </section>
    </main>
    <footer class="footer">
        <p>Your Health, Your Happiness, Your Strength — Start Today! 💪</p>
        <p class="footer-muted">Stay Strong. Stay Healthy. Stay Safe. ✨</p>
    </footer>
</body>
</html>
